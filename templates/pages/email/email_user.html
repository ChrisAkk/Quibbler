<html>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
    <div style="max-width: 600px; margin: auto; border: 1px solid #ddd; padding: 20px;">
        <h2 style="color: #5fa3f8;">Bonjour {{ nom }} !</h2>
        <p>Merci de nous avoir contactés. Ton message a bien été reçu par nos hiboux express.</p>
        
        <div style="background: #f9f9f9; padding: 15px; border-left: 5px solid #5fa3f8;">
            <p><strong>Objet :</strong> {{ objet }}</p>
            <p><strong>Ton message :</strong><br>{{ message }}</p>
        </div>

        <p>Nous te répondrons dans les plus brefs délais.</p>
        <hr>
        <footer style="font-size: 0.8em; color: #777;">
            Ceci est un message automatique, merci de ne pas y répondre directement.
        </footer>
    </div>
</body>
</html>
