<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quibbler | Jeux, Encyclopédie, Films et Livres Harry Potter</title>
    <meta name="description" content="Bienvenue sur Quibbler ! Explorez notre encyclopédie magique, testez vos connaissances avec nos jeux et retrouvez tout l'univers des films et des livres.">
    <meta property="og:title" content="Quibbler">
    <meta property="og:description" content="Jeux, encyclopédie, films et livres sur l'univers des sorciers.">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css">
    {% block extra_css %}{% endblock %}
</head>

<body>
    <header>
        <div class="global-header">
            <button class="menu-btn-phone">
                <div class="menu-phone"><i class="ri-menu-5-fill"></i></div>
                <div class="phone-menu">
                    <a class="exit"><i class="ri-close-line"></i></a>
                    <a class="searchable" href="{{url_for('routes.to_films')}}"><i class="ri-movie-line"></i> Films</a>
                    <a class="searchable" href="{{url_for('routes.to_livres')}}"><i class="ri-book-shelf-line"></i>
                        Livres</a>
                    <a class="searchable" href="{{url_for('routes.to_encyclopedie')}}"><i class="ri-book-line"></i>
                        Encyclopédie</a>
                    <a class="searchable" href="{{url_for('routes.to_jeux')}}"><i class="ri-gamepad-line"></i> Jeux</a>
                    <a class="searchable" href="{{url_for('routes.to_informations')}}"><i
                            class="ri-information-line"></i> Informations</i></a>
                    <a class="searchable" href="{{url_for('routes.to_contact')}}"><i class="ri-mail-send-line"></i>
                        Contact</a>
                    <a class="searchable" href="{{url_for('routes.logout')}}"><i class="ri-logout-circle-r-line"></i>
                        Déconnexion</a>
                    {% if user.admin == 1 %}
                    <a class="searchable" href="{{url_for('routes.to_admin')}}"><i class="ri-admin-line"></i> Admin</a>
                    {%endif%}
                </div>
            </button>
            <a href="{{url_for('routes.to_home')}}" class="hello-user">Quibbler</a>
            <div class="menu">
                <a class="searchable" href="{{url_for('routes.to_films')}}">Films</a>
                <a class="searchable" href="{{url_for('routes.to_livres')}}">Livres</a>
                <a class="searchable" href="{{url_for('routes.to_encyclopedie')}}">Encyclopédie</a>
                <a class="searchable" href="{{url_for('routes.to_jeux')}}">Jeux</a>
                <button class="menu-btn pc-only">
                    {% if user.profil_picture.startswith('http') %}
                        <img src="{{ user.profil_picture }}" class="photo-profil">
                    {% else %}
                        <img src="{{ url_for('static', filename='uploads/' + user.profil_picture) }}" class="photo-profil">
                    {% endif %}
                    <div class="profil-menu">
                        <a class="searchable" href="{{url_for('routes.to_profil')}}"><i class="ri-user-line"></i>
                            Profil</a>
                        <a class="searchable" href="{{url_for('routes.to_informations')}}"><i
                                class="ri-information-line"></i> Informations</a>
                        <a class="searchable" href="{{url_for('routes.to_contact')}}"><i class="ri-mail-send-line"></i>
                            Contact</a>
                        <a class="searchable" href="{{url_for('routes.logout')}}"><i
                                class="ri-logout-circle-r-line"></i> Déconnexion</a>
                        {% if user.admin == 1 %}
                        <a class="searchable" href="{{url_for('routes.to_admin')}}"><i class="ri-admin-line"></i>
                            Admin</a>
                        {%endif%}
                    </div>
                </button>
                <a href="{{ url_for('routes.to_profil')}}" class="menu-btn phone-only">
                    {% if user.profil_picture.startswith('http') %}
                        <img src="{{ user.profil_picture }}" class="photo-profil">
                    {% else %}
                        <img src="{{ url_for('static', filename='uploads/' + user.profil_picture) }}" class="photo-profil">
                    {% endif %}
                </a>
            </div>
        </div>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <img src="/static/images/background-footer.png">
        <div class="all-footer">
            <p>copyright 2026 | Quibbler</p>
            <a class="searchable-footer" href="{{url_for('routes.to_informations')}}">Informations</a>
            <a class="searchable-footer" href="{{url_for('routes.to_contact')}}">Contact</a>
            <a class="searchable-footer" href="{{url_for('routes.logout')}}">Déconnexion</a>
            <a href="https://www.instagram.com/harrypotter/?hl=en" target="_blank">Instagram</a>
        </div>
    </footer>
    <script src="{{ url_for('static', filename = 'javascript/main.js')}}"></script>
</body>

</html>
